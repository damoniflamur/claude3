name: Terraform Auto Apply on Merge

on:
  push:
    branches:
      - main
    paths:
      - "terraform/environments/dev/**"
      - "terraform/modules/**"

permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  apply:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Generate Readable Plan Output
        run: terraform show -no-color tfplan | tee tfplan.txt

      - name: Publish Plan Summary
        run: |
          PLAN_SUMMARY=$(grep -E '^Plan:' tfplan.txt | tail -1 || true)
          CHANGED_RESOURCES=$(grep -E '^  # .* will be ' tfplan.txt || true)

          {
            echo "## Terraform Apply Preview"
            echo
            if [ -n "$PLAN_SUMMARY" ]; then
              echo "- $PLAN_SUMMARY"
            else
              echo "- Plan summary not found"
            fi
            echo
            echo "### Resources With Changes"
            if [ -n "$CHANGED_RESOURCES" ]; then
              echo '```'
              echo "$CHANGED_RESOURCES"
              echo '```'
            else
              echo "No resource-level changes found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Plan Output Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-output-dev
          path: terraform/environments/dev/tfplan.txt
          if-no-files-found: error

      - name: Terraform Apply
        run: terraform apply -input=false tfplan | tee tfapply.txt

      - name: Publish Apply Summary
        if: always()
        run: |
          APPLY_SUMMARY=$(grep -E '^Apply complete!|^No changes\.' tfapply.txt | tail -1 || true)
          APPLY_CHANGES=$(grep -E '^  # .*: (Creating|Modifying|Destroying)\.\.\.' tfapply.txt || true)

          {
            echo
            echo "## Terraform Apply Result"
            echo
            if [ -n "$APPLY_SUMMARY" ]; then
              echo "- $APPLY_SUMMARY"
            else
              echo "- Apply summary not found"
            fi
            echo
            echo "### Apply Actions"
            if [ -n "$APPLY_CHANGES" ]; then
              echo '```'
              echo "$APPLY_CHANGES"
              echo '```'
            else
              echo "No resource-level apply actions found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Apply Output Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-output-dev
          path: terraform/environments/dev/tfapply.txt
          if-no-files-found: error
