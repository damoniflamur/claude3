name: Terraform Review

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Validate
        run: terraform init -backend=false && terraform validate

      - name: Claude Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'EOF'
          import json, os, glob, urllib.request

          files = ""
          for path in glob.glob("**/*.tf", recursive=True) + glob.glob("**/*.tfvars", recursive=True):
              with open(path) as f:
                  files += f"\n\n### {path}\n{f.read()}"

          skills = ""
          for skill_path in sorted(glob.glob(".claude/skills/*.md")):
              with open(skill_path) as f:
                  skills += f"\n\n---\n{f.read()}"

          prompt = f"""You are a senior DevOps engineer reviewing a Terraform PR.
          Apply every check defined in the skills below. Score out of 100.
          List findings with severity (BLOCK / WARN / INFO) and include an hcl fix snippet for every issue.

          ## Review Skills
          {skills}

          ## Terraform Files
          {files}"""

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps({
                  "model": os.environ["CLAUDE_MODEL"],
                  "max_tokens": 2048,
                  "messages": [{"role": "user", "content": prompt}]
              }).encode(),
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              }
          )

          with urllib.request.urlopen(req) as res:
              review = json.loads(res.read())["content"][0]["text"]

          with open("review.txt", "w") as f:
              f.write(review)
          EOF

          gh pr comment "$PR_NUMBER" --body-file review.txt
