name: Terraform Apply

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"

jobs:
  plan:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init

      - name: Plan
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

      - name: Security review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          PLAN_OUTPUT: ${{ env.PLAN_TEXT }}
        run: |
          PLAN=$(terraform show -no-color tfplan 2>&1)
          echo "PLAN_TEXT<<EOF" >> $GITHUB_ENV
          echo "$PLAN" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          PLAN_OUTPUT="$PLAN" python3 .github/scripts/terraform_security.py

      - name: Comment plan
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PLAN=$(terraform show -no-color tfplan 2>&1)
          SECURITY=$(cat security.txt)

          TO_ADD=$(echo "$PLAN"    | grep -c '# .* will be created'   || true)
          TO_CHANGE=$(echo "$PLAN" | grep -c '# .* will be updated'   || true)
          TO_DESTROY=$(echo "$PLAN"| grep -c '# .* will be destroyed' || true)

          SUMMARY=""
          [ "$TO_ADD" -gt 0 ]     && SUMMARY="${SUMMARY} **+${TO_ADD} to add**"
          [ "$TO_CHANGE" -gt 0 ]  && SUMMARY="${SUMMARY} **~${TO_CHANGE} to change**"
          [ "$TO_DESTROY" -gt 0 ] && SUMMARY="${SUMMARY} **-${TO_DESTROY} to destroy**"
          [ -z "$SUMMARY" ]       && SUMMARY="No changes — infrastructure is up to date."

          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          ## Terraform Plan

          $SUMMARY

          ---

          ## Security Review

          $SECURITY

          ---

          <details>
          <summary>Full plan</summary>

          \`\`\`hcl
          $PLAN
          \`\`\`

          </details>

          > Approve the [deployment](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) to apply.
          EOF
          )"

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Apply
        run: terraform apply -auto-approve tfplan

      - name: Comment result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            gh pr comment "$PR_NUMBER" --body "✅ **Terraform apply succeeded** on merge of this PR."
          else
            gh pr comment "$PR_NUMBER" --body "❌ **Terraform apply failed** — check the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi
